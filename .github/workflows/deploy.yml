name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - development

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Run tests
        run: mvn clean test

      - name: Publish test results
        uses: publish-unit-test-result-action@v2
        if: always()
        with:
          files: target/surefire-reports/*.xml

  package:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Package
        run: mvn package -DskipTests

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar

  deploy:
    runs-on: ubuntu-latest
    needs: package
    if: github.ref == 'refs/heads/main'
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: target/

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-west-1

      - name: Deploy to Elastic Beanstalk
        run: |
          VERSION_LABEL="${{ github.run_number }}-$(date +%Y%m%d-%H%M%S)"
          JAR_FILE=$(ls target/*.jar | head -1)

          aws s3 cp $JAR_FILE s3://${{ secrets.S3_BUCKET }}/deployments/$VERSION_LABEL.jar

          aws elasticbeanstalk create-application-version \
              --application-name ${{ secrets.EB_APP_NAME }} \
              --version-label $VERSION_LABEL \
              --source-bundle S3Bucket=${{ secrets.S3_BUCKET }},S3Key=deployments/$VERSION_LABEL.jar

          aws elasticbeanstalk update-environment \
              --environment-name ${{ secrets.EB_ENV_NAME }} \
              --version-label $VERSION_LABEL \
              --option-settings \
                  Namespace=aws:elasticbeanstalk:application:environment,OptionName=SPRING_PROFILES_ACTIVE,Value=prod \
                  Namespace=aws:elasticbeanstalk:application:environment,OptionName=PORT,Value=8080 \
                  Namespace=aws:elasticbeanstalk:application:environment,OptionName=MYSQL_FULL_URL_PROD,Value=${{ secrets.DB_URL }} \
                  Namespace=aws:elasticbeanstalk:application:environment,OptionName=MYSQL_USER_PROD,Value=${{ secrets.DB_USERNAME }} \
                  Namespace=aws:elasticbeanstalk:application:environment,OptionName=MYSQL_PASSWORD_PROD,Value=${{ secrets.DB_PASSWORD }}

      - name: Wait for deployment
        run: |
          for i in $(seq 1 24); do
            STATUS=$(aws elasticbeanstalk describe-environments \
                --environment-names ${{ secrets.EB_ENV_NAME }} \
                --query "Environments[0].Status" \
                --output text)
            echo "Current status: $STATUS"
            if [ "$STATUS" = "Ready" ]; then
              echo "Deployment complete"
              exit 0
            fi
            sleep 15
          done
          echo "Deployment timed out"
          exit 1
