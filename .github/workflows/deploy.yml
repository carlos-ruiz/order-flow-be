name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - development

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      checks: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Run tests
        run: mvn clean test

      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: target/surefire-reports/*.xml

  package:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Package
        run: mvn package -DskipTests

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar

  deploy:
    runs-on: ubuntu-latest
    needs: package
    if: github.ref == 'refs/heads/main'
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: target/

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-west-1

      - name: Deploy to Elastic Beanstalk
        env:
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          EB_APP_NAME: ${{ secrets.EB_APP_NAME }}
          EB_ENV_NAME: ${{ secrets.EB_ENV_NAME }}
          DB_URL: ${{ secrets.DB_URL }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: |
          VERSION_LABEL="${{ github.run_number }}-$(date +%Y%m%d-%H%M%S)"
          JAR_FILE=$(ls target/*.jar | head -1)

          aws s3 cp $JAR_FILE s3://$S3_BUCKET/deployments/$VERSION_LABEL.jar

          aws elasticbeanstalk create-application-version \
              --application-name $EB_APP_NAME \
              --version-label $VERSION_LABEL \
              --source-bundle S3Bucket=$S3_BUCKET,S3Key=deployments/$VERSION_LABEL.jar

          aws elasticbeanstalk update-environment \
              --environment-name $EB_ENV_NAME \
              --version-label $VERSION_LABEL \
              --option-settings \
                  Namespace=aws:elasticbeanstalk:application:environment,OptionName=SPRING_PROFILES_ACTIVE,Value=prod \
                  Namespace=aws:elasticbeanstalk:application:environment,OptionName=PORT,Value=8080 \
                  Namespace=aws:elasticbeanstalk:application:environment,OptionName=MYSQL_FULL_URL_PROD,Value=$DB_URL \
                  Namespace=aws:elasticbeanstalk:application:environment,OptionName=MYSQL_USER_PROD,Value=$DB_USERNAME \
                  Namespace=aws:elasticbeanstalk:application:environment,OptionName=MYSQL_PASSWORD_PROD,Value=$DB_PASSWORD

      - name: Wait for deployment
        env:
          EB_ENV_NAME: ${{ secrets.EB_ENV_NAME }}
        run: |
          for i in $(seq 1 24); do
            STATUS=$(aws elasticbeanstalk describe-environments \
                --environment-names $EB_ENV_NAME \
                --query "Environments[0].Status" \
                --output text)
            echo "Current status: $STATUS"
            if [ "$STATUS" = "Ready" ]; then
              echo "Deployment complete"
              exit 0
            fi
            sleep 15
          done
          echo "Deployment timed out"
          exit 1
